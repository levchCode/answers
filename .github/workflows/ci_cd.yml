name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - '**'

jobs:
  build_and_deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Compose
      uses: docker/setup-buildx-action@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest

    - name: Log in to Docker Hub
      run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Build and push Docker image
      run: |
        docker-compose build
        docker-compose push
  
    - name: Deploy to VDS
      env:
        DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/answer:${{ github.sha }}
        VDS_USER: ${{ secrets.VDS_USER }}
        VDS_PASSWORD: ${{ secrets.VDS_PASSWORD }}
        VDS_IP: ${{ secrets.VDS_IP }}
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass
        
        sshpass -p $VDS_PASSWORD ssh -o "StrictHostKeyChecking=no" $VDS_USER@$VDS_IP << 'EOF'
          docker-compose pull
          docker-compose down || true
          docker-compose up -d
        EOF

  test_only:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest
